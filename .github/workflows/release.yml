name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
      PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive plugin version from tag
        run: echo "PLUGIN_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build plugin
        run: ./gradlew buildPlugin -PpluginVersion=$PLUGIN_VERSION

      - name: Verify plugin
        run: ./gradlew verifyPlugin -PpluginVersion=$PLUGIN_VERSION

      - name: Sign plugin
        run: ./gradlew signPlugin -PpluginVersion=$PLUGIN_VERSION

      - name: Publish to JetBrains Marketplace
        run: ./gradlew publishPlugin -PpluginVersion=$PLUGIN_VERSION

      - name: Publish to GitHub Packages
        run: ./gradlew publish -PpluginVersion=$PLUGIN_VERSION -PmavenPublishVersion=$PLUGIN_VERSION
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            build/distributions/*.zip \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            $([[ "$PLUGIN_VERSION" == *-* ]] && echo --prerelease)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
